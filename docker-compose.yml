services:
  api:
    build:
      context: .
      dockerfile: src/HrManagement.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__HrDatabase: Host=db;Port=5432;Database=hr_management;Username=hr_user;Password=hr_password
      Database__ApplyMigrationsOnStartup: "true"
      Llm__BaseUrl: http://ollama:11434
      Llm__Model: llama3
      Llm__GeneratePath: /api/generate
    ports:
      - "8080:8080"
    depends_on:
      - db
      - ollama

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hr_management
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
