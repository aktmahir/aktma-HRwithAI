name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true

      - name: Restore dependencies
        run: dotnet restore HrManagement.slnx

      - name: Build
        run: dotnet build HrManagement.slnx --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test tests/HrManagement.Domain.Tests/HrManagement.Domain.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test tests/HrManagement.Application.Tests/HrManagement.Application.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test tests/HrManagement.Infrastructure.Tests/HrManagement.Infrastructure.Tests.csproj --configuration Release --no-build --verbosity normal
          dotnet test tests/HrManagement.Api.Tests/HrManagement.Api.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: Run static analysis
        run: |
          dotnet tool install --global dotnet-format
          dotnet format --verify-no-changes HrManagement.slnx

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/trivy-installer@v2
        with:
          version: latest

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif-file: 'trivy-results.sarif'

      - name: Scan Docker image for vulnerabilities
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: false

  docker:
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/HrManagement.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'
          kubeconfig: '${{ secrets.KUBECONFIG_STAGING }}'

      - name: Deploy to staging (Kubernetes)
        run: |
          kubectl apply -f k8s/namespace-staging.yaml --namespace=hr-management-staging || true
          kubectl set image deployment/hr-management-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --namespace=hr-management-staging || \
            kubectl apply -f k8s/deployment.yaml --namespace=hr-management-staging

      - name: Run migration job
        run: |
          kubectl wait --for=condition=ready pod -l app=hr-management-api --namespace=hr-management-staging --timeout=60s
          kubectl run hrmigration-${{ github.sha }} --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --restart=Never --namespace=hr-management-staging -- \
            --run-migrations-only || true

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/hr-management-api --namespace=hr-management-staging --timeout=120s
      - name: Rollback staging on failure
        if: failure()
        run: |
          echo "Deployment to staging failed. Rolling back to previous revision."
          kubectl rollout undo deployment/hr-management-api --namespace=hr-management-staging || true

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'
          kubeconfig: '${{ secrets.KUBECONFIG_PROD }}'

      - name: Deploy to production (Kubernetes)
        run: |
          kubectl apply -f k8s/namespace-prod.yaml --namespace=hr-management-prod || true
          kubectl set image deployment/hr-management-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --namespace=hr-management-prod --record || \
            kubectl apply -f k8s/deployment.yaml --namespace=hr-management-prod --record

      - name: Run migration job
        run: |
          kubectl run hrmigration-${{ github.sha }} --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --restart=Never --namespace=hr-management-prod -- \
            --run-migrations-only || true

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/hr-management-api --namespace=hr-management-prod --timeout=120s