apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-management-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hr-management-api
  template:
    metadata:
      labels:
        app: hr-management-api
    spec:
      containers:
        - name: api
          image: ghcr.io/hr-management-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ConnectionStrings__HrDatabase
              valueFrom:
                secretKeyRef:
                  name: hr-management-secrets
                  key: connection-string
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: hr-management-secrets
                  key: jwt-secret
            - name: Jwt__Issuer
              value: "https://api.yourdomain.com"
            - name: Jwt__Audience
              value: "hr-management-api"
            - name: Jwt__ExpiryMinutes
              value: "1440"
            - name: Jwt__RefreshTokenExpiryDays
              value: "7"
            - name: Jwt__RefreshTokenRollingExpiryMinutes
              value: "60"
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hr-management-secrets
                  key: default-admin-password
            - name: Llm__BaseUrl
              valueFrom:
                secretKeyRef:
                  name: hr-management-secrets
                  key: llm-base-url
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "0.5"
              memory: "256Mi"